<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Baby Sitter Screenshot Generator</title>
  <style>
    :root {
      --bg: #fff9f6;
      --bg-deep: #ffe9e3;
      --paper: #fffdfb;
      --ink: #4e3a3c;
      --muted: #755f62;
      --accent: #cf889b;
      --accent-deep: #aa6478;
      --line: rgba(191, 143, 151, 0.18);
      --shadow: 0 28px 60px rgba(179, 126, 137, 0.14);
      --heading-font: "Iowan Old Style", "Noto Serif", serif;
      --body-font: "Pretendard", "Apple SD Gothic Neo", "Noto Sans", sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: var(--body-font);
      color: var(--ink);
      background:
        radial-gradient(circle at top left, rgba(245, 216, 190, 0.24), transparent 28%),
        radial-gradient(circle at 86% 12%, rgba(228, 172, 189, 0.18), transparent 24%),
        linear-gradient(180deg, var(--bg) 0%, var(--bg-deep) 100%);
      min-height: 100vh;
    }

    .toolbar {
      position: sticky;
      top: 0;
      z-index: 10;
      display: flex;
      flex-wrap: wrap;
      justify-content: space-between;
      gap: 12px 18px;
      padding: 18px 24px;
      background: rgba(255, 250, 247, 0.9);
      border-bottom: 1px solid var(--line);
      backdrop-filter: blur(16px);
    }

    .toolbar h1 {
      margin: 0;
      font-family: var(--heading-font);
      font-size: 1.2rem;
      letter-spacing: -0.03em;
    }

    .toolbar p {
      margin: 4px 0 0;
      color: var(--muted);
      font-size: 0.94rem;
    }

    .toolbar-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
    }

    button {
      appearance: none;
      border: 0;
      border-radius: 999px;
      padding: 10px 14px;
      font: inherit;
      font-weight: 700;
      color: var(--ink);
      background: rgba(255, 255, 255, 0.8);
      box-shadow: 0 10px 20px rgba(188, 137, 147, 0.1);
      cursor: pointer;
    }

    button.is-active {
      color: #fff;
      background: linear-gradient(135deg, var(--accent) 0%, #e0a8b7 100%);
    }

    .frames {
      width: min(100%, 1400px);
      margin: 0 auto;
      padding: 28px 20px 72px;
      display: grid;
      gap: 40px;
    }

    .frame {
      width: 100%;
      max-width: 1240px;
      aspect-ratio: 1240 / 2208;
      margin: 0 auto;
      background:
        radial-gradient(circle at 14% 10%, rgba(248, 206, 219, 0.86), transparent 28%),
        radial-gradient(circle at 84% 10%, rgba(255, 236, 214, 0.82), transparent 26%),
        linear-gradient(180deg, #fff8f5 0%, #ffefeb 60%, #ffe5e7 100%);
      border-radius: 48px;
      overflow: hidden;
      box-shadow: var(--shadow);
      border: 1px solid rgba(191, 143, 151, 0.16);
      display: grid;
      grid-template-rows: auto 1fr auto;
      padding: 84px 78px 72px;
    }

    .frame-head {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-bottom: 34px;
    }

    .brand-mark {
      width: 84px;
      height: 84px;
      border-radius: 28px;
      overflow: hidden;
      background: rgba(255, 255, 255, 0.76);
      box-shadow: 0 14px 28px rgba(196, 143, 153, 0.16);
    }

    .brand-mark img {
      display: block;
      width: 100%;
      height: 100%;
    }

    .brand-copy strong {
      display: block;
      font-size: 2rem;
      letter-spacing: -0.03em;
    }

    .brand-copy span {
      display: block;
      margin-top: 4px;
      font-size: 1rem;
      color: var(--muted);
    }

    .frame-body {
      display: grid;
      grid-template-columns: minmax(0, 0.95fr) minmax(0, 1.05fr);
      gap: 42px;
      align-items: center;
    }

    .copy {
      max-width: 16ch;
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 22px;
      padding: 10px 16px;
      border-radius: 999px;
      color: var(--accent-deep);
      background: rgba(228, 172, 189, 0.16);
      border: 1px solid rgba(213, 146, 165, 0.22);
      font-size: 0.86rem;
      font-weight: 700;
      letter-spacing: 0.16em;
      text-transform: uppercase;
    }

    .eyebrow::before {
      content: "";
      width: 10px;
      height: 10px;
      border-radius: 999px;
      background: currentColor;
      box-shadow: 0 0 0 8px rgba(228, 172, 189, 0.14);
    }

    h2 {
      margin: 0 0 20px;
      font-family: var(--heading-font);
      font-size: 4.25rem;
      line-height: 0.96;
      letter-spacing: -0.05em;
    }

    .support {
      margin: 0;
      font-size: 1.34rem;
      line-height: 1.72;
      color: var(--muted);
    }

    .visual {
      position: relative;
      min-height: 1240px;
      border-radius: 36px;
      overflow: hidden;
      background: rgba(255, 252, 250, 0.78);
      border: 1px solid rgba(191, 143, 151, 0.14);
      box-shadow: 0 24px 48px rgba(175, 123, 134, 0.12);
    }

    .visual img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center top;
    }

    .visual-caption {
      position: absolute;
      left: 24px;
      right: 24px;
      bottom: 24px;
      padding: 18px 20px;
      border-radius: 24px;
      background: rgba(255, 250, 247, 0.84);
      backdrop-filter: blur(14px);
      border: 1px solid rgba(191, 143, 151, 0.14);
      color: var(--muted);
      font-size: 1rem;
      line-height: 1.6;
    }

    .frame-foot {
      display: flex;
      justify-content: space-between;
      gap: 20px;
      margin-top: 26px;
      color: rgba(94, 73, 76, 0.72);
      font-size: 1rem;
    }

    .frame-foot strong {
      color: var(--accent-deep);
    }

    @media (max-width: 1100px) {
      .frame {
        padding: 48px 36px 42px;
      }

      .frame-body {
        grid-template-columns: 1fr;
      }

      .visual {
        min-height: auto;
        aspect-ratio: 4 / 5;
      }

      h2 {
        font-size: 3rem;
      }
    }
  </style>
</head>
<body>
  <div class="toolbar">
    <div>
      <h1>Baby Sitter Screenshot Generator</h1>
      <p>언어 버튼을 바꾼 뒤 각 프레임을 캡처해서 Play 스크린샷 시안으로 사용하세요.</p>
    </div>
    <div class="toolbar-actions">
      <button type="button" class="is-active" data-locale="en">EN</button>
      <button type="button" data-locale="id">ID</button>
      <button type="button" data-locale="pt">PT</button>
      <button type="button" data-locale="es">ES</button>
    </div>
  </div>

  <main class="frames" id="frames"></main>

  <script>
    (() => {
      const imageByLocale = {
        en: "../../homepage/assets/homepage-img-1-en.webp",
        id: "../../homepage/assets/homepage-img-1-en.webp",
        pt: "../../homepage/assets/homepage-img-1-en.webp",
        es: "../../homepage/assets/homepage-img-1-en.webp"
      };

      const translations = {
        en: {
          brandSub: "Calmer nights for baby and parents",
          footerLeft: "Same Wi-Fi only",
          footerRight: "No cloud video collection",
          cards: [
            {
              eyebrow: "Old Android Phone",
              title: "Turn a spare phone into a baby monitor.",
              support: "Start tonight with an unused Android phone, a simple stand, and home Wi-Fi.",
              caption: "A calmer nursery setup without buying a new baby camera."
            },
            {
              eyebrow: "Sound + Motion",
              title: "Notice small wake-up signs earlier.",
              support: "Watch sound and movement before a full wake-up interrupts the night.",
              caption: "Designed to help parents react before restlessness becomes a full wake-up."
            },
            {
              eyebrow: "Parent Voice",
              title: "Soothe with a lullaby in mom or dad's voice.",
              support: "Record a familiar voice so your baby hears comfort before fully waking.",
              caption: "A parent's own voice can feel gentler than a generic lullaby."
            },
            {
              eyebrow: "Privacy",
              title: "Remote viewing stays on the same Wi-Fi.",
              support: "Check the nursery from another room without sending nursery video to the cloud.",
              caption: "Same-Wi-Fi viewing is one of the clearest trust messages for this product."
            },
            {
              eyebrow: "Safety",
              title: "Keep the phone outside the crib.",
              support: "Use a stable stand, keep cables out of reach, and treat the app as a support tool.",
              caption: "Not a medical device. Not a replacement for caregiver supervision."
            }
          ]
        },
        id: {
          brandSub: "Malam lebih tenang untuk bayi dan orang tua",
          footerLeft: "Hanya di Wi-Fi yang sama",
          footerRight: "Tanpa video cloud",
          cards: [
            {
              eyebrow: "HP Android Lama",
              title: "Ubah ponsel cadangan jadi monitor bayi.",
              support: "Mulai malam ini dengan HP Android lama, dudukan sederhana, dan Wi-Fi rumah.",
              caption: "Kamar bayi lebih tenang tanpa harus membeli kamera baru."
            },
            {
              eyebrow: "Suara + Gerakan",
              title: "Sadari tanda bayi akan bangun lebih awal.",
              support: "Pantau suara dan gerakan sebelum bayi benar-benar terbangun di malam hari.",
              caption: "Membantu orang tua merespons sebelum gelisah kecil berubah jadi tangisan penuh."
            },
            {
              eyebrow: "Suara Orang Tua",
              title: "Tenangkan dengan lagu nina bobo suara ibu atau ayah.",
              support: "Rekam suara yang akrab agar bayi merasa lebih nyaman sebelum benar-benar bangun.",
              caption: "Suara orang tua sendiri sering terasa lebih lembut daripada lagu umum."
            },
            {
              eyebrow: "Privasi",
              title: "Pantau jarak jauh di Wi-Fi yang sama saja.",
              support: "Lihat dari ruangan lain tanpa mengirim video kamar bayi ke cloud.",
              caption: "Pesan privasi ini penting untuk membangun rasa aman sejak awal."
            },
            {
              eyebrow: "Keamanan",
              title: "Jauhkan ponsel dari tempat tidur bayi.",
              support: "Gunakan dudukan stabil, jauhkan kabel dari jangkauan, dan pakai aplikasi ini sebagai alat bantu.",
              caption: "Bukan alat medis. Bukan pengganti pengawasan orang tua."
            }
          ]
        },
        pt: {
          brandSub: "Noites mais calmas para o bebê e para os pais",
          footerLeft: "Somente no mesmo Wi-Fi",
          footerRight: "Sem vídeo na nuvem",
          cards: [
            {
              eyebrow: "Android Antigo",
              title: "Transforme um celular parado em babá eletrônica.",
              support: "Comece hoje à noite com um Android antigo, um suporte simples e o Wi-Fi de casa.",
              caption: "Mais calma no quarto do bebê sem comprar uma câmera nova."
            },
            {
              eyebrow: "Som + Movimento",
              title: "Perceba sinais pequenos antes do despertar completo.",
              support: "Acompanhe som e movimento antes que o bebê acorde de vez durante a noite.",
              caption: "Ajuda os pais a reagirem antes que a inquietação vire um despertar completo."
            },
            {
              eyebrow: "Voz dos Pais",
              title: "Acalme com a voz da mãe ou do pai.",
              support: "Grave uma canção de ninar com uma voz familiar para ajudar o bebê a relaxar novamente.",
              caption: "A voz dos pais pode soar mais acolhedora do que uma faixa genérica."
            },
            {
              eyebrow: "Privacidade",
              title: "A visualização remota fica no mesmo Wi-Fi.",
              support: "Veja o quarto do bebê de outro cômodo sem enviar o vídeo para a nuvem.",
              caption: "Esta é uma das mensagens de confiança mais fortes para o primeiro teste."
            },
            {
              eyebrow: "Segurança",
              title: "Mantenha o telefone fora do berço.",
              support: "Use um suporte firme, mantenha cabos longe do alcance e trate o app como apoio.",
              caption: "Não é um dispositivo médico. Não substitui a supervisão do cuidador."
            }
          ]
        },
        es: {
          brandSub: "Noches más tranquilas para el bebé y sus padres",
          footerLeft: "Solo en la misma red Wi-Fi",
          footerRight: "Sin video en la nube",
          cards: [
            {
              eyebrow: "Android Viejo",
              title: "Convierte un teléfono guardado en monitor para bebé.",
              support: "Empieza esta noche con un Android viejo, un soporte sencillo y el Wi-Fi de casa.",
              caption: "Más calma en la habitación del bebé sin comprar una cámara nueva."
            },
            {
              eyebrow: "Sonido + Movimiento",
              title: "Nota señales pequeñas antes del despertar completo.",
              support: "Observa sonido y movimiento antes de que el bebé despierte por completo durante la noche.",
              caption: "Ayuda a reaccionar antes de que la inquietud se convierta en un despertar completo."
            },
            {
              eyebrow: "Voz de los Padres",
              title: "Calma al bebé con la voz de mamá o papá.",
              support: "Graba una canción de cuna con una voz familiar para acompañar al bebé otra vez al sueño.",
              caption: "La voz de sus padres puede sentirse más cercana que una pista genérica."
            },
            {
              eyebrow: "Privacidad",
              title: "La vista remota se queda en la misma red Wi-Fi.",
              support: "Mira desde otra habitación sin enviar el video del cuarto del bebé a la nube.",
              caption: "Es una de las promesas de confianza más claras para esta prueba."
            },
            {
              eyebrow: "Seguridad",
              title: "Mantén el teléfono fuera de la cuna.",
              support: "Usa un soporte estable, deja los cables fuera del alcance y úsalo como herramienta de apoyo.",
              caption: "No es un dispositivo médico. No reemplaza la supervisión del cuidador."
            }
          ]
        }
      };

      const frames = document.getElementById("frames");
      const buttons = document.querySelectorAll("[data-locale]");

      const render = (locale) => {
        const copy = translations[locale] || translations.en;
        const imageSrc = imageByLocale[locale] || imageByLocale.en;

        frames.innerHTML = copy.cards.map((card) => `
          <section class="frame">
            <div class="frame-head">
              <div class="brand-mark">
                <img src="../../homepage/assets/app-icon.webp" alt="">
              </div>
              <div class="brand-copy">
                <strong>Baby Sitter</strong>
                <span>${copy.brandSub}</span>
              </div>
            </div>
            <div class="frame-body">
              <div class="copy">
                <div class="eyebrow">${card.eyebrow}</div>
                <h2>${card.title}</h2>
                <p class="support">${card.support}</p>
              </div>
              <div class="visual">
                <img src="${imageSrc}" alt="">
                <div class="visual-caption">${card.caption}</div>
              </div>
            </div>
            <div class="frame-foot">
              <span><strong>Baby Sitter</strong></span>
              <span>${copy.footerLeft} · ${copy.footerRight}</span>
            </div>
          </section>
        `).join("");

        buttons.forEach((button) => {
          button.classList.toggle("is-active", button.dataset.locale === locale);
        });

        document.documentElement.lang = locale;
      };

      buttons.forEach((button) => {
        button.addEventListener("click", () => render(button.dataset.locale));
      });

      render("en");
    })();
  </script>
</body>
</html>
