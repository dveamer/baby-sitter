<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Baby Sitter Memory Download</title>
  <style>
    :root {
      --bg: #050816;
      --surface: rgba(255, 255, 255, 0.06);
      --line: rgba(255, 255, 255, 0.12);
      --text: #f8fafc;
      --accent: #ff8a3d;
    }
    * {
      box-sizing: border-box;
    }
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      font-family: "Pretendard", "Noto Sans KR", "Apple SD Gothic Neo", "Segoe UI", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top, rgba(255, 138, 61, 0.18), transparent 30%),
        linear-gradient(180deg, #17335a 0%, var(--bg) 58%);
    }
    main {
      width: min(100%, 360px);
      padding: 32px 28px;
      border-radius: 24px;
      border: 1px solid var(--line);
      background: var(--surface);
      text-align: center;
      backdrop-filter: blur(14px);
      box-shadow: 0 24px 60px rgba(0, 0, 0, 0.28);
    }
    #message {
      margin: 0;
      font-size: 17px;
      font-weight: 700;
      line-height: 1.8;
      word-break: keep-all;
    }
    #downloadBtn {
      width: 72px;
      height: 72px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      margin-top: 24px;
      border: 0;
      border-radius: 999px;
      color: #fff;
      background: linear-gradient(135deg, #ffb154, var(--accent));
      box-shadow: 0 18px 34px rgba(255, 138, 61, 0.34);
      cursor: pointer;
      opacity: 0;
      transform: translateY(10px);
      pointer-events: none;
      transition: opacity 0.24s ease, transform 0.24s ease;
    }
    #downloadBtn.visible {
      opacity: 1;
      transform: translateY(0);
      pointer-events: auto;
    }
    #downloadBtn svg {
      width: 30px;
      height: 30px;
      display: block;
    }
    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }
  </style>
</head>
<body>
  <main>
    <p id="message"></p>
    <button id="downloadBtn" type="button" hidden aria-label="영상 다운로드">
      <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
        <path
          d="M12 4v10m0 0 4-4m-4 4-4-4M5 18v2a1 1 0 0 0 1 1h12a1 1 0 0 0 1-1v-2"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
        />
      </svg>
      <span class="sr-only">영상 다운로드</span>
    </button>
  </main>
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-1213240297656328" crossorigin="anonymous"></script>
  <script>
    (() => {
      const isKoreanUser = (navigator.language || "").toLowerCase().startsWith("ko");
      const copy = isKoreanUser
        ? {
            message: "광고 시청 감사드립니다. 광고시청 후 영상다운로드 버튼이 노출됩니다.\n앱 개발자에게 큰 도움을 주셔서 감사합니다.",
            invalidUrl: "다운로드 주소가 올바르지 않습니다."
          }
        : {
            message: "Thank you for watching the ad. The video download button will appear after the ad is shown.\nYour support is a big help to the app developer.",
            invalidUrl: "The download URL is invalid."
          };

      const DOWNLOAD_BUTTON_DELAY_MS = 5000;
      const messageEl = document.getElementById("message");
      const downloadBtn = document.getElementById("downloadBtn");
      const params = new URLSearchParams(window.location.search);

      let downloadUrl = null;
      let downloadButtonTimerId = null;

      function setMessage(message) {
        messageEl.textContent = message;
      }

      function decodeDownloadUrl(value) {
        if (!value) throw new Error("missing_url");
        const decoded = atob(value);
        const parsed = new URL(decoded);
        if (parsed.protocol !== "http:" && parsed.protocol !== "https:") {
          throw new Error("invalid_url");
        }
        return parsed.toString();
      }

      function revealDownloadButton() {
        if (downloadButtonTimerId !== null) {
          window.clearTimeout(downloadButtonTimerId);
        }
        downloadButtonTimerId = window.setTimeout(() => {
          downloadBtn.hidden = false;
          window.requestAnimationFrame(() => {
            downloadBtn.classList.add("visible");
          });
        }, DOWNLOAD_BUTTON_DELAY_MS);
      }

      function startDownload(absoluteDownloadUrl) {
        const link = document.createElement("a");
        link.href = absoluteDownloadUrl;
        link.rel = "noopener";
        link.style.display = "none";
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
      }

      function initAdPlacementApi() {
        window.adsbygoogle = window.adsbygoogle || [];
        if (typeof window.adBreak !== "function") {
          window.adBreak = function(options) {
            window.adsbygoogle.push(options);
          };
        }
        if (typeof window.adConfig !== "function") {
          window.adConfig = function(options) {
            window.adsbygoogle.push(options);
          };
        }
      }

      function requestPreroll() {
        window.adBreak({
          type: "preroll",
          name: "memory_share_download_preroll",
          adBreakDone: () => {
          }
        });
      }

      function startFlow() {
        initAdPlacementApi();
        window.adConfig({
          preloadAdBreaks: "on",
          sound: "off"
        });
        try {
          requestPreroll();
        } catch (_) {
        }
        revealDownloadButton();
      }

      setMessage(copy.message);

      try {
        downloadUrl = decodeDownloadUrl(params.get("url"));
      } catch (_) {
        setMessage(copy.invalidUrl);
        return;
      }

      downloadBtn.addEventListener("click", () => {
        try {
          startDownload(downloadUrl);
        } catch (_) {
          setMessage(copy.invalidUrl);
          return;
        }
        window.setTimeout(() => {
          window.close();
          window.setTimeout(() => {
            if (!window.closed) {
              try {
                window.open("", "_self");
              } catch (_) {
              }
              window.close();
            }
          }, 250);
        }, 3000);
      });

      startFlow();
    })();
  </script>
</body>
</html>
