<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Baby Sitter Settings</title>
  <style>
    :root {
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #121212;
      --muted: #616161;
      --line: #e6e8ee;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
    }
    main {
      max-width: 720px;
      margin: 0 auto;
      padding: 16px;
    }
    h1 {
      margin: 0 0 12px;
      font-size: 24px;
    }
    .meta {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
      color: var(--muted);
      font-size: 14px;
      gap: 12px;
    }
    .btn {
      border: 1px solid var(--line);
      background: var(--card);
      border-radius: 10px;
      padding: 8px 12px;
      cursor: pointer;
    }
    .btn:disabled {
      cursor: wait;
      opacity: 0.7;
    }
    .icon-btn {
      width: 40px;
      min-width: 40px;
      min-height: 40px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 0;
    }
    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }
    .panel {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 14px;
      margin-bottom: 12px;
    }
    .title {
      margin: 0 0 10px;
      font-size: 20px;
      font-weight: 700;
    }
    .camera-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 10px;
    }
    .camera-header .title {
      margin-bottom: 0;
    }
    .camera-record-btn {
      border-color: #fecaca;
      background: #fff1f2;
      color: #b42318;
    }
    .camera-record-icon {
      width: 18px;
      height: 18px;
      display: block;
    }
    .camera-hint {
      margin-bottom: 10px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.4;
    }
    .row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 0;
      border-top: 1px solid var(--line);
      gap: 12px;
    }
    .row:first-of-type { border-top: none; }
    .label { font-size: 16px; }
    .value {
      color: var(--muted);
      font-weight: 600;
      word-break: break-word;
      text-align: right;
    }
    .input {
      width: 96px;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 6px 8px;
      font-size: 14px;
      text-align: right;
      background: #fff;
    }
    .input:disabled {
      opacity: 1;
      cursor: default;
    }
    select.input {
      text-align: left;
      min-width: 120px;
    }
    .actions {
      display: flex;
      gap: 8px;
      margin-top: 12px;
    }
    #sleepActions {
      margin-bottom: 8px;
    }
    #sleepBtn {
      width: 100%;
      min-height: 48px;
      font-size: 16px;
      font-weight: 700;
    }
    .sleep-status {
      margin-bottom: 14px;
      display: grid;
      gap: 8px;
    }
    .sleep-status-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      border: 1px solid var(--line);
      background: #f9fafc;
      border-radius: 10px;
      padding: 10px 12px;
    }
    .sleep-status-label {
      color: #4a5568;
      font-weight: 600;
      font-size: 14px;
    }
    .sleep-status-value {
      font-size: 13px;
      font-weight: 700;
      border-radius: 999px;
      padding: 4px 10px;
      background: #e7eefb;
      color: #1f4ea3;
      text-transform: uppercase;
      letter-spacing: 0.02em;
    }
    .sleep-status-value.ready {
      background: #e7eefb;
      color: #1f4ea3;
    }
    .sleep-status-value.not-ready {
      background: #fff1f1;
      color: #9f1d1d;
    }
    .sleep-status-value.active {
      background: #e9f9ed;
      color: #127a28;
    }
    #cameraPanel {
      display: none;
    }
    .success {
      background: #edfdf0;
      border: 1px solid #cdeed4;
      color: #127a28;
      border-radius: 10px;
      padding: 10px;
      margin-bottom: 12px;
      display: none;
    }
    .camera-feed {
      width: 100%;
      aspect-ratio: 4 / 3;
      object-fit: contain;
      background: #000;
      display: block;
      border-radius: 10px;
    }
    .status-on { color: #127a28; }
    .status-off { color: #9f1d1d; }
    .error {
      background: #fff0f0;
      border: 1px solid #ffd7d7;
      color: #9f1d1d;
      border-radius: 10px;
      padding: 10px;
      margin-bottom: 12px;
      display: none;
    }
    .camera-error {
      margin-top: 10px;
      margin-bottom: 0;
    }
    .monitoring-empty {
      margin-top: 10px;
      margin-bottom: 0;
    }
    .memory-actions {
      display: flex;
      justify-content: flex-end;
      margin-bottom: 10px;
    }
    .memory-list {
      margin: 0;
      padding: 0;
      list-style: none;
      display: grid;
      gap: 8px;
      max-height: 220px;
      overflow: auto;
    }
    .memory-item {
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 10px;
      cursor: pointer;
      background: #fff;
    }
    .memory-item.selected {
      border-color: #1f4ea3;
      background: #eff4ff;
    }
    .memory-item-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
    }
    .memory-item-main {
      min-width: 0;
      flex: 1;
    }
    .memory-item-title {
      font-weight: 600;
      word-break: break-word;
    }
    .memory-item-actions {
      flex-shrink: 0;
    }
    .memory-share-btn {
      white-space: nowrap;
    }
    .memory-share-icon {
      width: 18px;
      height: 18px;
      display: block;
      color: currentColor;
    }
    .memory-meta {
      color: var(--muted);
      font-size: 13px;
      margin-top: 4px;
    }
    .memory-video {
      width: 100%;
      margin-top: 10px;
      border-radius: 10px;
      background: #000;
    }
    .memory-empty {
      color: var(--muted);
      font-size: 14px;
      padding: 10px;
      border: 1px dashed var(--line);
      border-radius: 10px;
    }
    .sensitivity-block {
      border-top: 1px solid var(--line);
      padding: 10px 0;
    }
    .sensitivity-block:first-of-type {
      border-top: none;
      padding-top: 0;
    }
    .sensitivity-title {
      font-size: 16px;
      margin-bottom: 8px;
    }
    .preset-buttons {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 8px;
      margin-bottom: 8px;
    }
    .preset-btn {
      width: 100%;
      min-height: 40px;
      font-weight: 700;
    }
    .preset-btn.selected {
      background: #1f4ea3;
      color: #fff;
      border-color: #1f4ea3;
    }
    .sensitivity-slider {
      width: 100%;
    }
  </style>
</head>
<body>
  <main>
    <h1>Settings</h1>
    <div id="error" class="error"></div>
    <div id="success" class="success"></div>
    <div class="meta">
      <div id="updatedAt">Last updated: -</div>
      <button id="refreshBtn" class="btn" type="button">Refresh</button>
    </div>

    <section id="cameraPanel" class="panel">
      <div class="camera-header">
        <h2 class="title">Camera</h2>
        <button id="cameraMemoryBtn" class="btn icon-btn camera-record-btn" type="button" aria-label="Save memory" title="Save memory">
          <svg class="camera-record-icon" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
            <circle cx="12" cy="12" r="9" fill="none" stroke="currentColor" stroke-width="1.8"></circle>
            <circle cx="12" cy="12" r="5" fill="currentColor"></circle>
          </svg>
          <span class="sr-only">Save memory</span>
        </button>
      </div>
      <div id="cameraMemoryHint" class="camera-hint"></div>
      <img id="cameraFeed" class="camera-feed" alt="camera stream">
      <div id="cameraError" class="error camera-error"></div>
    </section>

    <div id="sleepActions" class="actions">
      <button id="sleepBtn" class="btn" type="button">Sleep Off</button>
    </div>
    <div class="sleep-status">
      <div class="sleep-status-row">
        <span class="sleep-status-label">Monitoring</span>
        <span id="monitoringStatusValue" class="sleep-status-value ready">READY</span>
      </div>
      <div class="sleep-status-row">
        <span class="sleep-status-label">Lullaby</span>
        <span id="lullabyStatusValue" class="sleep-status-value ready">READY</span>
      </div>
    </div>

    <section class="panel">
      <h2 class="title">Monitoring</h2>
      <div id="soundSensitivityRow" class="sensitivity-block">
        <div class="sensitivity-title">Sound Sensitivity (<span id="soundThresholdValue">500</span>)</div>
        <div id="soundPresetButtons" class="preset-buttons">
          <button class="btn preset-btn" type="button" data-value="HIGH">High</button>
          <button class="btn preset-btn" type="button" data-value="MEDIUM">Medium</button>
          <button class="btn preset-btn" type="button" data-value="LOW">Low</button>
        </div>
        <input id="soundThresholdSlider" class="sensitivity-slider" type="range" min="50" max="2000" step="1">
      </div>
      <div id="motionSensitivityRow" class="sensitivity-block">
        <div class="sensitivity-title">Motion Sensitivity (<span id="motionThresholdValue">20</span>)</div>
        <div id="motionPresetButtons" class="preset-buttons">
          <button class="btn preset-btn" type="button" data-value="HIGH">High</button>
          <button class="btn preset-btn" type="button" data-value="MEDIUM">Medium</button>
          <button class="btn preset-btn" type="button" data-value="LOW">Low</button>
        </div>
        <input id="motionThresholdSlider" class="sensitivity-slider" type="range" min="5" max="100" step="1">
      </div>
      <div id="monitoringEmptyMessage" class="error monitoring-empty"></div>
    </section>

    <section class="panel">
      <h2 id="memoryTitle" class="title">Memory</h2>
      <div class="memory-actions">
        <button id="memoryRefreshBtn" class="btn" type="button">Reload</button>
      </div>
      <div id="memoryEmpty" class="memory-empty">No memory videos.</div>
      <ul id="memoryList" class="memory-list"></ul>
      <video id="memoryVideo" class="memory-video" controls playsinline></video>
    </section>

  </main>

  <script>
    const errorEl = document.getElementById("error");
    const successEl = document.getElementById("success");
    const updatedAtEl = document.getElementById("updatedAt");
    const refreshBtn = document.getElementById("refreshBtn");
    const sleepBtn = document.getElementById("sleepBtn");
    const cameraPanel = document.getElementById("cameraPanel");
    const cameraFeed = document.getElementById("cameraFeed");
    const cameraMemoryBtn = document.getElementById("cameraMemoryBtn");
    const cameraMemoryHintEl = document.getElementById("cameraMemoryHint");
    const cameraErrorEl = document.getElementById("cameraError");

    const soundSensitivityRow = document.getElementById("soundSensitivityRow");
    const soundThresholdValueEl = document.getElementById("soundThresholdValue");
    const soundPresetButtonsEl = document.getElementById("soundPresetButtons");
    const soundThresholdSlider = document.getElementById("soundThresholdSlider");
    const motionSensitivityRow = document.getElementById("motionSensitivityRow");
    const motionThresholdValueEl = document.getElementById("motionThresholdValue");
    const motionPresetButtonsEl = document.getElementById("motionPresetButtons");
    const motionThresholdSlider = document.getElementById("motionThresholdSlider");
    const monitoringEmptyMessageEl = document.getElementById("monitoringEmptyMessage");
    const monitoringStatusValueEl = document.getElementById("monitoringStatusValue");
    const lullabyStatusValueEl = document.getElementById("lullabyStatusValue");
    const memoryTitleEl = document.getElementById("memoryTitle");
    const memoryRefreshBtn = document.getElementById("memoryRefreshBtn");
    const memoryListEl = document.getElementById("memoryList");
    const memoryVideoEl = document.getElementById("memoryVideo");
    const memoryEmptyEl = document.getElementById("memoryEmpty");

    let sleepEnabled = false;
    let webCameraEnabled = false;
    let soundMonitoringEnabled = false;
    let motionMonitoringEnabled = false;
    let soothingMusicEnabled = false;
    let musicPlaylistCount = 0;
    let monitoringActive = false;
    let lullabyActive = false;
    let memoryBuildInProgress = false;
    let manualMemoryRequestInProgress = false;
    let cameraMemoryAvailable = false;
    let soundSensitivity = "MEDIUM";
    let motionSensitivity = "MEDIUM";
    let cryThresholdSec = 500;
    let movementThresholdSec = 20;
    let cameraConnectTimeoutId = null;
    let cameraAttemptToken = 0;
    let cameraStreaming = false;
    let cameraStreamMode = null;
    let sleepStatusPollTimeoutId = null;
    let memoryItems = [];
    let selectedMemoryFile = null;
    let sharingMemoryFile = null;
    let manualMemorySaving = false;
    const SLEEP_STATUS_POLL_INTERVAL_MS = 10000;
    const SOUND_PRESET_VALUES = { HIGH: 250, MEDIUM: 500, LOW: 750 };
    const MOTION_PRESET_VALUES = { HIGH: 14, MEDIUM: 20, LOW: 28 };
    const isKoreanUser = (navigator.language || "").toLowerCase().startsWith("ko");
    const memoryTitleText = isKoreanUser ? "Memory (3일 보관)" : "Memory (3-day retention)";
    const cameraConnectionFailedMessage = isKoreanUser
      ? "연결에 실패했습니다. Baby Sitter 앱이 더 강한 안드로이드 카메라 권한을 필요로 합니다."
      : "Connection failed. The Baby Sitter app requires stronger Android camera permissions.";
    const cameraMemoryButtonLabel = isKoreanUser
      ? "전후 5분 Memory 저장"
      : "Save 5-minute memory";
    const cameraMemorySavingLabel = isKoreanUser
      ? "Memory 저장 중"
      : "Saving memory";
    const cameraMemoryHintText = isKoreanUser
      ? "녹화 버튼을 누르면 전후 총 5분 구간의 영상이 Memory 로 저장됩니다."
      : "Press the record button to save a 5-minute video around that moment as Memory.";
    const cameraMemorySuccessMessage = isKoreanUser
      ? "전후 5분 Memory를 저장했습니다."
      : "Saved the surrounding 5-minute memory.";
    const cameraMemoryNotReadyMessage = isKoreanUser
      ? "필요한 collect 파일이 아직 모두 닫히지 않았습니다. 잠시 후 다시 시도해 주세요."
      : "The required collect files are not closed yet. Try again shortly.";
    const cameraMemoryUnavailableMessage = isKoreanUser
      ? "memory를 만들 collect 영상이 충분하지 않습니다."
      : "There is not enough collected video to build a memory.";
    const cameraMemoryFailedMessage = isKoreanUser
      ? "Memory 저장에 실패했습니다."
      : "Failed to save the memory.";
    const cameraMemoryAlreadyPendingMessage = isKoreanUser
      ? "이미 다른 수동 Memory 저장 요청이 진행 중입니다."
      : "Another manual memory request is already running.";
    const monitoringDisabledMessage = isKoreanUser
      ? "Sound, Motion 모두 사용되지 않도록 설정되어 아기가 깼는지 감지할 수 없습니다."
      : "Both Sound and Motion are disabled, so the app cannot detect whether the baby has woken up.";
    const shareButtonLabel = isKoreanUser ? "영상 저장 또는 공유" : "Save or share video";
    const sharePageBaseUrl = "https://babysitter.dveamer.com/share-memory.html";
    const shareFailedMessage = isKoreanUser
      ? "영상 공유 페이지를 열지 못했습니다"
      : "Failed to open the video share page";

    memoryTitleEl.textContent = memoryTitleText;

    function showError(message) {
      successEl.style.display = "none";
      successEl.textContent = "";
      errorEl.style.display = "block";
      errorEl.textContent = message;
    }

    function showSuccess(message) {
      errorEl.style.display = "none";
      errorEl.textContent = "";
      successEl.style.display = "block";
      successEl.textContent = message;
    }

    function hideError() {
      errorEl.style.display = "none";
      errorEl.textContent = "";
    }

    function hideSuccess() {
      successEl.style.display = "none";
      successEl.textContent = "";
    }

    function selectedSoundPreset(value) {
      if (value === SOUND_PRESET_VALUES.HIGH) return "HIGH";
      if (value === SOUND_PRESET_VALUES.MEDIUM) return "MEDIUM";
      if (value === SOUND_PRESET_VALUES.LOW) return "LOW";
      return null;
    }

    function selectedMotionPreset(value) {
      if (value === MOTION_PRESET_VALUES.HIGH) return "HIGH";
      if (value === MOTION_PRESET_VALUES.MEDIUM) return "MEDIUM";
      if (value === MOTION_PRESET_VALUES.LOW) return "LOW";
      return null;
    }

    function markSelectedPreset(container, preset) {
      container.querySelectorAll(".preset-btn").forEach((button) => {
        button.classList.toggle("selected", button.dataset.value === preset);
      });
    }

    function renderSensitivityControls() {
      soundThresholdValueEl.textContent = String(cryThresholdSec);
      soundThresholdSlider.value = String(cryThresholdSec);
      markSelectedPreset(soundPresetButtonsEl, selectedSoundPreset(cryThresholdSec));

      motionThresholdValueEl.textContent = String(movementThresholdSec);
      motionThresholdSlider.value = String(movementThresholdSec);
      markSelectedPreset(motionPresetButtonsEl, selectedMotionPreset(movementThresholdSec));
    }

    function updateSensitivityVisibility() {
      soundSensitivityRow.style.display = soundMonitoringEnabled ? "block" : "none";
      motionSensitivityRow.style.display = motionMonitoringEnabled ? "block" : "none";
      if (!soundMonitoringEnabled && !motionMonitoringEnabled) {
        monitoringEmptyMessageEl.style.display = "block";
        monitoringEmptyMessageEl.textContent = monitoringDisabledMessage;
      } else {
        monitoringEmptyMessageEl.style.display = "none";
        monitoringEmptyMessageEl.textContent = "";
      }
    }

    function renderSleepStatus() {
      const monitoringReady = soundMonitoringEnabled || motionMonitoringEnabled;
      const monitoringStatus = !monitoringReady
        ? "not ready"
        : (sleepEnabled && monitoringActive ? "active" : "ready");
      monitoringStatusValueEl.textContent = monitoringStatus.toUpperCase();
      monitoringStatusValueEl.className = "sleep-status-value " + monitoringStatus.replace(" ", "-");

      const lullabyReady = soothingMusicEnabled && musicPlaylistCount > 0;
      const lullabyStatus = lullabyActive
        ? "active"
        : (lullabyReady ? "ready" : "not ready");
      lullabyStatusValueEl.textContent = lullabyStatus.toUpperCase();
      lullabyStatusValueEl.className = "sleep-status-value " + lullabyStatus.replace(" ", "-");
    }

    function renderCameraMemoryControls() {
      const busy = manualMemorySaving || manualMemoryRequestInProgress || memoryBuildInProgress;
      cameraMemoryBtn.disabled = manualMemorySaving || !cameraMemoryAvailable;
      cameraMemoryBtn.setAttribute("aria-label", busy ? cameraMemorySavingLabel : cameraMemoryButtonLabel);
      cameraMemoryBtn.title = busy ? cameraMemorySavingLabel : cameraMemoryButtonLabel;
      const srLabel = cameraMemoryBtn.querySelector(".sr-only");
      if (srLabel) {
        srLabel.textContent = busy ? cameraMemorySavingLabel : cameraMemoryButtonLabel;
      }
      cameraMemoryHintEl.textContent = cameraMemoryHintText;
    }

    function formatBytes(bytes) {
      if (!Number.isFinite(bytes) || bytes < 1024) return bytes + " B";
      if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + " KB";
      return (bytes / (1024 * 1024)).toFixed(1) + " MB";
    }

    function formatDuration(ms) {
      const totalSec = Math.max(0, Math.floor((ms || 0) / 1000));
      const min = Math.floor(totalSec / 60);
      const sec = totalSec % 60;
      return min + "m " + sec + "s";
    }

    function pad2(value) {
      return String(value).padStart(2, "0");
    }

    function formatAmPmTime(date) {
      const hours24 = date.getHours();
      const hours12 = hours24 % 12 || 12;
      const amPm = hours24 < 12 ? "AM" : "PM";
      return amPm + " " + hours12 + ":" + pad2(date.getMinutes()) + ":" + pad2(date.getSeconds());
    }

    function formatDateTime(date) {
      const datePart = new Intl.DateTimeFormat(undefined, {
        year: "numeric",
        month: "numeric",
        day: "numeric"
      }).format(date);
      return datePart + " " + formatAmPmTime(date);
    }

    function downloadIconSvg() {
      return `
        <svg class="memory-share-icon" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
          <path
            d="M12 3v10m0 0 4-4m-4 4-4-4M5 15v3a1 1 0 0 0 1 1h12a1 1 0 0 0 1-1v-3"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          />
        </svg>
      `;
    }

    function memoryVideoUrl(fileName) {
      return "/memory/" + encodeURIComponent(fileName);
    }

    function memoryDownloadUrl(fileName) {
      return "/memory-download/" + encodeURIComponent(fileName);
    }

    function memoryDownloadAbsoluteUrl(fileName) {
      return new URL(memoryDownloadUrl(fileName), window.location.href).toString();
    }

    function sharePageUrl(fileName) {
      const params = new URLSearchParams({
        url: btoa(memoryDownloadAbsoluteUrl(fileName)),
        autostart: "1"
      });
      return sharePageBaseUrl + "?" + params.toString();
    }

    async function shareMemory(fileName) {
      if (!fileName || sharingMemoryFile) return;
      sharingMemoryFile = fileName;
      renderMemoryList();
      hideError();
      hideSuccess();
      try {
        const nextUrl = sharePageUrl(fileName);
        const shareWindow = window.open(nextUrl, "_blank");
        if (shareWindow) {
          try {
            shareWindow.opener = null;
          } catch (_) {
          }
          return;
        }
        window.location.assign(nextUrl);
      } catch (e) {
        showError(shareFailedMessage + ": " + e.message);
      } finally {
        sharingMemoryFile = null;
        renderMemoryList();
      }
    }

    function renderMemoryList() {
      memoryListEl.innerHTML = "";
      if (!memoryItems.length) {
        memoryEmptyEl.style.display = "block";
        return;
      }
      memoryEmptyEl.style.display = "none";
      memoryItems.forEach((item) => {
        const li = document.createElement("li");
        li.className = "memory-item" + (selectedMemoryFile === item.fileName ? " selected" : "");
        li.dataset.fileName = item.fileName;
        const startedAt = formatDateTime(new Date(item.startEpochMs));
        const isSharing = sharingMemoryFile === item.fileName;
        li.innerHTML = `
          <div class="memory-item-row">
            <div class="memory-item-main">
              <div class="memory-item-title">${startedAt}</div>
              <div class="memory-meta">${formatDuration(item.durationMs)} / ${formatBytes(item.sizeBytes)}</div>
            </div>
            <div class="memory-item-actions">
              <button
                class="btn icon-btn memory-share-btn"
                type="button"
                data-file-name="${item.fileName}"
                aria-label="${shareButtonLabel}"
                title="${shareButtonLabel}"
                ${isSharing ? "disabled" : ""}
              >${downloadIconSvg()}<span class="sr-only">${shareButtonLabel}</span></button>
            </div>
          </div>
        `;
        memoryListEl.appendChild(li);
      });
    }

    async function loadMemoryList(options = {}) {
      const { noStore = false } = options;
      try {
        const res = await fetch("/memory", {
          headers: { "Accept": "application/json" },
          cache: noStore ? "no-store" : "default"
        });
        if (!res.ok) throw new Error("HTTP " + res.status);
        const data = await res.json();
        memoryItems = Array.isArray(data.items) ? data.items : [];
        if (!memoryItems.some((it) => it.fileName === selectedMemoryFile)) {
          selectedMemoryFile = null;
          memoryVideoEl.src = "";
        }
        renderMemoryList();
      } catch (e) {
        showError("Failed to load memory list: " + e.message);
      }
    }

    function manualMemoryErrorMessage(payload) {
      const reason = payload && payload.skippedReason ? String(payload.skippedReason) : "";
      if (reason === "manual_request_in_progress") return cameraMemoryAlreadyPendingMessage;
      if (reason === "memory_range_not_ready") return cameraMemoryNotReadyMessage;
      if (reason === "no_video_collect" || reason === "start_not_found" || reason === "no_video_in_range" || reason === "no_closed_video_range") {
        return cameraMemoryUnavailableMessage;
      }
      return cameraMemoryFailedMessage;
    }

    async function saveCameraMemory() {
      if (manualMemorySaving || manualMemoryRequestInProgress || memoryBuildInProgress || !cameraMemoryAvailable) return;
      manualMemorySaving = true;
      hideError();
      hideSuccess();
      renderCameraMemoryControls();
      try {
        const res = await fetch("/memory/manual", {
          method: "POST",
          headers: { "Accept": "application/json" }
        });
        const payload = await res.json().catch(() => null);
        if (!res.ok) {
          throw new Error(manualMemoryErrorMessage(payload));
        }
        await loadMemoryList({ noStore: true });
        if (payload && payload.fileName) {
          selectMemory(payload.fileName);
        }
        showSuccess(cameraMemorySuccessMessage);
      } catch (e) {
        showError(e && e.message ? e.message : cameraMemoryFailedMessage);
      } finally {
        manualMemorySaving = false;
        await loadSettings({ silent: true });
        renderCameraMemoryControls();
      }
    }

    function selectMemory(fileName) {
      selectedMemoryFile = fileName;
      memoryVideoEl.src = memoryVideoUrl(fileName);
      renderMemoryList();
    }

    async function updateSettingsPatch(patch) {
      try {
        const res = await fetch("/settings", {
          method: "PUT",
          headers: {
            "Content-Type": "application/json",
            "Accept": "application/json"
          },
          body: JSON.stringify(patch)
        });
        if (!res.ok) throw new Error("HTTP " + res.status);
        hideError();
        hideSuccess();
      } catch (e) {
        showError("Failed to update settings: " + e.message);
        await loadSettings();
      }
    }

    function clearCameraConnectTimeout() {
      if (cameraConnectTimeoutId) {
        clearTimeout(cameraConnectTimeoutId);
        cameraConnectTimeoutId = null;
      }
    }

    function hideCameraError() {
      cameraErrorEl.style.display = "none";
      cameraErrorEl.textContent = "";
      clearCameraConnectTimeout();
    }

    function showCameraError() {
      cameraErrorEl.style.display = "block";
      cameraErrorEl.textContent = cameraConnectionFailedMessage;
      clearCameraConnectTimeout();
    }

    function clearSleepStatusPoll() {
      if (sleepStatusPollTimeoutId) {
        clearTimeout(sleepStatusPollTimeoutId);
        sleepStatusPollTimeoutId = null;
      }
    }

    function scheduleSleepStatusPoll() {
      clearSleepStatusPoll();
      if (!sleepEnabled && !manualMemoryRequestInProgress && !memoryBuildInProgress) return;
      sleepStatusPollTimeoutId = setTimeout(() => {
        loadSettings({ silent: true });
      }, SLEEP_STATUS_POLL_INTERVAL_MS);
    }

    function desiredCameraStreamMode() {
      return sleepEnabled && motionMonitoringEnabled ? "motion" : "rear";
    }

    function startCameraStream(mode) {
      if (!webCameraEnabled) return;
      const nextMode = mode || desiredCameraStreamMode();
      if (cameraStreaming && cameraStreamMode === nextMode && cameraFeed.src) return;
      cameraAttemptToken += 1;
      cameraStreaming = true;
      cameraStreamMode = nextMode;
      cameraFeed.src = "";
      hideCameraError();
      const attempt = ++cameraAttemptToken;
      cameraFeed.src = "/camera/stream?mode=" + nextMode + "&ts=" + Date.now();
      cameraConnectTimeoutId = setTimeout(() => {
        if (attempt !== cameraAttemptToken) return;
        cameraStreaming = false;
        cameraFeed.src = "";
        showCameraError();
      }, 8000);
    }

    function stopCameraStream() {
      cameraAttemptToken += 1;
      cameraStreaming = false;
      cameraStreamMode = null;
      hideCameraError();
      cameraFeed.src = "";
    }

    async function loadSettings(options = {}) {
      const { silent = false } = options;
      clearSleepStatusPoll();
      try {
        const res = await fetch("/settings", { headers: { "Accept": "application/json" } });
        if (!res.ok) throw new Error("HTTP " + res.status);
        const settings = await res.json();

        if (!silent) {
          hideError();
          hideSuccess();
        }

        sleepEnabled = !!settings.sleepEnabled;
        sleepBtn.textContent = sleepEnabled ? "Sleep Off" : "Sleep On";
        soundMonitoringEnabled = !!settings.soundMonitoringEnabled;
        soundSensitivity = settings.soundSensitivity || "MEDIUM";
        cryThresholdSec = Number(settings.cryThresholdSec ?? 500);
        motionMonitoringEnabled = !!settings.cameraMonitoringEnabled;
        motionSensitivity = settings.motionSensitivity || "MEDIUM";
        movementThresholdSec = Number(settings.movementThresholdSec ?? 20);
        soothingMusicEnabled = !!settings.soothingMusicEnabled;
        musicPlaylistCount = Number(settings.musicPlaylistCount ?? 0);
        monitoringActive = !!settings.monitoringActive;
        lullabyActive = !!settings.lullabyActive;
        memoryBuildInProgress = !!settings.memoryBuildInProgress;
        manualMemoryRequestInProgress = !!settings.manualMemoryRequestInProgress;
        cameraMemoryAvailable = !!settings.cameraMemoryAvailable;

        webCameraEnabled = !!settings.webCameraEnabled;
        cameraPanel.style.display = webCameraEnabled ? "block" : "none";
        if (webCameraEnabled) {
          const nextMode = desiredCameraStreamMode();
          startCameraStream(nextMode);
        } else {
          stopCameraStream();
        }

        renderSensitivityControls();
        updateSensitivityVisibility();
        renderSleepStatus();
        renderCameraMemoryControls();
        updatedAtEl.textContent = "Last updated: " + formatAmPmTime(new Date());
        scheduleSleepStatusPoll();
      } catch (e) {
        if (!silent) {
          showError("Failed to load settings: " + e.message);
        }
        scheduleSleepStatusPoll();
      }
    }

    async function toggleSleep() {
      try {
        const nextSleepEnabled = !sleepEnabled;
        const res = await fetch("/settings", {
          method: "PUT",
          headers: {
            "Content-Type": "application/json",
            "Accept": "application/json"
          },
          body: JSON.stringify({ sleepEnabled: nextSleepEnabled })
        });
        if (!res.ok) throw new Error("HTTP " + res.status);

        hideError();
        showSuccess(nextSleepEnabled ? "Sleep enabled" : "Sleep disabled");
        await loadSettings();
      } catch (e) {
        showError("Failed to toggle sleep: " + e.message);
      }
    }

    refreshBtn.addEventListener("click", loadSettings);
    cameraMemoryBtn.addEventListener("click", saveCameraMemory);
    memoryRefreshBtn.addEventListener("click", loadMemoryList);
    memoryListEl.addEventListener("click", async (event) => {
      const shareButton = event.target.closest(".memory-share-btn");
      if (shareButton) {
        await shareMemory(shareButton.dataset.fileName);
        return;
      }
      const item = event.target.closest(".memory-item");
      if (!item) return;
      selectMemory(item.dataset.fileName);
    });
    sleepBtn.addEventListener("click", toggleSleep);
    soundPresetButtonsEl.addEventListener("click", async (event) => {
      const button = event.target.closest(".preset-btn");
      if (!button || !soundMonitoringEnabled) return;
      const preset = button.dataset.value;
      if (!preset || !Object.prototype.hasOwnProperty.call(SOUND_PRESET_VALUES, preset)) return;
      soundSensitivity = preset;
      cryThresholdSec = SOUND_PRESET_VALUES[preset];
      renderSensitivityControls();
      await updateSettingsPatch({ soundSensitivity, cryThresholdSec });
    });
    motionPresetButtonsEl.addEventListener("click", async (event) => {
      const button = event.target.closest(".preset-btn");
      if (!button || !motionMonitoringEnabled) return;
      const preset = button.dataset.value;
      if (!preset || !Object.prototype.hasOwnProperty.call(MOTION_PRESET_VALUES, preset)) return;
      motionSensitivity = preset;
      movementThresholdSec = MOTION_PRESET_VALUES[preset];
      renderSensitivityControls();
      await updateSettingsPatch({ motionSensitivity, movementThresholdSec });
    });
    soundThresholdSlider.addEventListener("input", () => {
      cryThresholdSec = Number(soundThresholdSlider.value);
      renderSensitivityControls();
    });
    soundThresholdSlider.addEventListener("change", async () => {
      if (!soundMonitoringEnabled) return;
      await updateSettingsPatch({ cryThresholdSec });
    });
    motionThresholdSlider.addEventListener("input", () => {
      movementThresholdSec = Number(motionThresholdSlider.value);
      renderSensitivityControls();
    });
    motionThresholdSlider.addEventListener("change", async () => {
      if (!motionMonitoringEnabled) return;
      await updateSettingsPatch({ movementThresholdSec });
    });
    cameraFeed.addEventListener("load", () => {
      cameraStreaming = true;
      hideCameraError();
    });
    cameraFeed.addEventListener("error", () => {
      if (!webCameraEnabled) return;
      cameraStreaming = false;
      cameraFeed.src = "";
      showCameraError();
    });

    renderCameraMemoryControls();
    loadSettings();
    loadMemoryList();
  </script>
</body>
</html>
