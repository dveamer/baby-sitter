<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Baby Sitter Settings</title>
  <style>
    :root {
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #121212;
      --muted: #616161;
      --line: #e6e8ee;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
    }
    main {
      max-width: 720px;
      margin: 0 auto;
      padding: 16px;
    }
    h1 {
      margin: 0 0 12px;
      font-size: 24px;
    }
    .meta {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
      color: var(--muted);
      font-size: 14px;
      gap: 12px;
    }
    .btn {
      border: 1px solid var(--line);
      background: var(--card);
      border-radius: 10px;
      padding: 8px 12px;
      cursor: pointer;
    }
    .panel {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 14px;
      margin-bottom: 12px;
    }
    .title {
      margin: 0 0 10px;
      font-size: 20px;
      font-weight: 700;
    }
    .row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 0;
      border-top: 1px solid var(--line);
      gap: 12px;
    }
    .row:first-of-type { border-top: none; }
    .label { font-size: 16px; }
    .value {
      color: var(--muted);
      font-weight: 600;
      word-break: break-word;
      text-align: right;
    }
    .input {
      width: 96px;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 6px 8px;
      font-size: 14px;
      text-align: right;
      background: #fff;
    }
    .input:disabled {
      opacity: 1;
      cursor: default;
    }
    select.input {
      text-align: left;
      min-width: 120px;
    }
    .actions {
      display: flex;
      gap: 8px;
      margin-top: 12px;
    }
    #sleepBtn {
      width: 100%;
      min-height: 48px;
      font-size: 16px;
      font-weight: 700;
    }
    #cameraPanel {
      display: none;
    }
    .success {
      background: #edfdf0;
      border: 1px solid #cdeed4;
      color: #127a28;
      border-radius: 10px;
      padding: 10px;
      margin-bottom: 12px;
      display: none;
    }
    .camera-feed {
      width: 100%;
      aspect-ratio: 4 / 3;
      object-fit: contain;
      background: #000;
      display: block;
      border-radius: 10px;
    }
    .status-on { color: #127a28; }
    .status-off { color: #9f1d1d; }
    .error {
      background: #fff0f0;
      border: 1px solid #ffd7d7;
      color: #9f1d1d;
      border-radius: 10px;
      padding: 10px;
      margin-bottom: 12px;
      display: none;
    }
    .camera-error {
      margin-top: 10px;
      margin-bottom: 0;
    }
  </style>
</head>
<body>
  <main>
    <h1>Settings</h1>
    <div id="error" class="error"></div>
    <div id="success" class="success"></div>
    <div class="meta">
      <div id="updatedAt">Last updated: -</div>
      <button id="refreshBtn" class="btn" type="button">Refresh</button>
    </div>

    <section id="cameraPanel" class="panel">
      <h2 class="title">Camera</h2>
      <img id="cameraFeed" class="camera-feed" alt="camera stream">
      <div id="cameraError" class="error camera-error"></div>
    </section>

    <div class="actions">
      <button id="sleepBtn" class="btn" type="button">Sleep Off</button>
    </div>

    <section class="panel">
      <h2 class="title">Monitoring</h2>
      <div class="row">
        <div class="label">Sound</div>
        <input id="soundMonitoringEnabled" class="input" type="checkbox" disabled>
      </div>
      <div class="row">
        <div class="label">Sound Sensitivity</div>
        <select id="soundSensitivity" class="input" disabled>
          <option value="HIGH">High</option>
          <option value="MEDIUM">Medium</option>
          <option value="LOW">Low</option>
        </select>
      </div>
      <div class="row">
        <div class="label">Motion</div>
        <input id="cameraMonitoringEnabled" class="input" type="checkbox" disabled>
      </div>
      <div class="row">
        <div class="label">Motion Sensitivity</div>
        <select id="motionSensitivity" class="input" disabled>
          <option value="HIGH">High</option>
          <option value="MEDIUM">Medium</option>
          <option value="LOW">Low</option>
        </select>
      </div>
    </section>

    <section class="panel">
      <h2 class="title">Take Action</h2>
      <div class="row">
        <div class="label">Play Lullaby</div>
        <input id="soothingMusicEnabled" class="input" type="checkbox" disabled>
      </div>
    </section>

  </main>

  <script>
    const errorEl = document.getElementById("error");
    const successEl = document.getElementById("success");
    const updatedAtEl = document.getElementById("updatedAt");
    const refreshBtn = document.getElementById("refreshBtn");
    const sleepBtn = document.getElementById("sleepBtn");
    const cameraPanel = document.getElementById("cameraPanel");
    const cameraFeed = document.getElementById("cameraFeed");
    const cameraErrorEl = document.getElementById("cameraError");

    const soundInput = document.getElementById("soundMonitoringEnabled");
    const soundSensitivityRow = document.getElementById("soundSensitivity").closest(".row");
    const soundSensitivityInput = document.getElementById("soundSensitivity");
    const motionInput = document.getElementById("cameraMonitoringEnabled");
    const motionSensitivityRow = document.getElementById("motionSensitivity").closest(".row");
    const motionSensitivityInput = document.getElementById("motionSensitivity");
    const playMusicInput = document.getElementById("soothingMusicEnabled");

    let sleepEnabled = false;
    let webCameraEnabled = false;
    let cameraConnectTimeoutId = null;
    let cameraAttemptToken = 0;
    const isKoreanUser = (navigator.language || "").toLowerCase().startsWith("ko");
    const cameraConnectionFailedMessage = isKoreanUser
      ? "연결에 실패했습니다. Baby Sitter 앱이 더 강한 안드로이드 카메라 권한을 필요로 합니다."
      : "Connection failed. The Baby Sitter app requires stronger Android camera permissions.";

    function showError(message) {
      successEl.style.display = "none";
      successEl.textContent = "";
      errorEl.style.display = "block";
      errorEl.textContent = message;
    }

    function showSuccess(message) {
      errorEl.style.display = "none";
      errorEl.textContent = "";
      successEl.style.display = "block";
      successEl.textContent = message;
    }

    function hideError() {
      errorEl.style.display = "none";
      errorEl.textContent = "";
    }

    function hideSuccess() {
      successEl.style.display = "none";
      successEl.textContent = "";
    }

    function updateSensitivityVisibility() {
      soundSensitivityRow.style.display = soundInput.checked ? "flex" : "none";
      motionSensitivityRow.style.display = motionInput.checked ? "flex" : "none";
    }

    function clearCameraConnectTimeout() {
      if (cameraConnectTimeoutId) {
        clearTimeout(cameraConnectTimeoutId);
        cameraConnectTimeoutId = null;
      }
    }

    function hideCameraError() {
      cameraErrorEl.style.display = "none";
      cameraErrorEl.textContent = "";
      clearCameraConnectTimeout();
    }

    function showCameraError() {
      cameraErrorEl.style.display = "block";
      cameraErrorEl.textContent = cameraConnectionFailedMessage;
      clearCameraConnectTimeout();
    }

    function startCameraStream() {
      if (!webCameraEnabled) return;
      hideCameraError();
      const attempt = ++cameraAttemptToken;
      cameraFeed.src = "/camera/stream?ts=" + Date.now();
      cameraConnectTimeoutId = setTimeout(() => {
        if (attempt !== cameraAttemptToken) return;
        cameraFeed.src = "";
        showCameraError();
      }, 8000);
    }

    function stopCameraStream() {
      cameraAttemptToken += 1;
      hideCameraError();
      cameraFeed.src = "";
    }

    async function loadSettings() {
      try {
        const res = await fetch("/settings", { headers: { "Accept": "application/json" } });
        if (!res.ok) throw new Error("HTTP " + res.status);
        const settings = await res.json();

        hideError();
        hideSuccess();

        sleepEnabled = !!settings.sleepEnabled;
        sleepBtn.textContent = sleepEnabled ? "Sleep On" : "Sleep Off";
        soundInput.checked = !!settings.soundMonitoringEnabled;
        soundSensitivityInput.value = settings.soundSensitivity || "MEDIUM";
        motionInput.checked = !!settings.cameraMonitoringEnabled;
        motionSensitivityInput.value = settings.motionSensitivity || "MEDIUM";
        playMusicInput.checked = !!settings.soothingMusicEnabled;

        webCameraEnabled = !!settings.webCameraEnabled;
        cameraPanel.style.display = webCameraEnabled ? "block" : "none";
        if (webCameraEnabled) {
          startCameraStream();
        } else {
          stopCameraStream();
        }

        updateSensitivityVisibility();
        updatedAtEl.textContent = "Last updated: " + new Date().toLocaleTimeString();
      } catch (e) {
        showError("Failed to load settings: " + e.message);
      }
    }

    async function toggleSleep() {
      try {
        const nextSleepEnabled = !sleepEnabled;
        const res = await fetch("/settings", {
          method: "PUT",
          headers: {
            "Content-Type": "application/json",
            "Accept": "application/json"
          },
          body: JSON.stringify({ sleepEnabled: nextSleepEnabled })
        });
        if (!res.ok) throw new Error("HTTP " + res.status);

        hideError();
        showSuccess(nextSleepEnabled ? "Sleep enabled" : "Sleep disabled");
        await loadSettings();
      } catch (e) {
        showError("Failed to toggle sleep: " + e.message);
      }
    }

    refreshBtn.addEventListener("click", loadSettings);
    sleepBtn.addEventListener("click", toggleSleep);
    cameraFeed.addEventListener("load", hideCameraError);
    cameraFeed.addEventListener("error", () => {
      if (!webCameraEnabled) return;
      cameraFeed.src = "";
      showCameraError();
    });

    loadSettings();
  </script>
</body>
</html>
